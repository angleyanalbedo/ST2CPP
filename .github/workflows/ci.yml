name: CI/CD

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-java:
    name: Build Java Compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -DskipTests -Plsp-server --file java/pom.xml

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: st2c-jar
          path: |
            java/target/st2c-jar-with-dependencies.jar
            java/target/st2c-lsp-server-jar-with-dependencies.jar
          retention-days: 1

  build-runtime:
    name: Build C++ Runtime
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make

      - name: Configure CMake
        run: >
          cmake -B runtime-flat/build -S runtime-flat
          -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build runtime-flat/build --parallel

      - name: Run framework tests
        run: runtime-flat/build/framework_test.exe

      - name: Run unit tests
        run: runtime-flat/build/unit_test.exe

      - name: Upload runtime binaries
        uses: actions/upload-artifact@v4
        with:
          name: runtime-binaries
          path: runtime-flat/build/*.exe
          retention-days: 1

  integration-test:
    name: End-to-End Test (ST→C++→Build→Run)
    needs: [build-java]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: st2c-jar

      - name: Compile ST examples with JAR
        shell: powershell
        run: |
          java -jar java/target/st2c-jar-with-dependencies.jar `
            --input examples/test.st --output-dir output/flat/build
          java -jar java/target/st2c-jar-with-dependencies.jar `
            --input examples/test_struct.st --output-dir output/flat/build
          java -jar java/target/st2c-jar-with-dependencies.jar `
            --input examples/test_arr_struct.st --output-dir output/flat/build

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make

      - name: Convert workspace path for MSYS2
        shell: powershell
        run: |
          $msys2Path = "${{ github.workspace }}" -replace '\\', '/'
          echo "MSYS2_WORKSPACE=$msys2Path" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake with generated POU
        shell: msys2 {0}
        run: >
          cmake -B output/build -S runtime-flat
          -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          -DGEN_CPP_DIR=$MSYS2_WORKSPACE/output/flat/build

      - name: Build runtime with POU
        shell: msys2 {0}
        run: cmake --build output/build --parallel

      - name: Run integrated runtime
        shell: msys2 {0}
        run: output/build/runtime.exe

  package:
    name: Package Release ZIP
    if: github.event_name != 'pull_request'
    needs: [build-java, build-runtime, integration-test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: st2c-jar

      - name: Download runtime binaries
        uses: actions/download-artifact@v4
        with:
          name: runtime-binaries

      - name: Package into ZIP
        run: |
          New-Item -ItemType Directory -Force -Path st2c-release
          Copy-Item java/target/*.jar st2c-release/
          Copy-Item runtime-flat/build/*.exe st2c-release/
          Copy-Item -Recurse examples st2c-release/examples/
          Copy-Item -Recurse runtime-flat/include st2c-release/include/
          Copy-Item README.md st2c-release/
          Copy-Item compiler-to-runtime.md st2c-release/
          Copy-Item st-support.md st2c-release/
          Compress-Archive -Path st2c-release/* -DestinationPath st2c-build.zip

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: st2c-build
          path: st2c-build.zip
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: st2c-build.zip
          generate_release_notes: true
