name: CI/CD

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-java:
    name: Build Java Compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test with Maven
        run: mvn package --file java/pom.xml

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: st2c-jar
          path: java/target/st2c-jar-with-dependencies.jar
          retention-days: 1

  build-runtime:
    name: Build C++ Runtime
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make

      - name: Configure CMake
        run: >
          cmake -B runtime-flat/build -S runtime-flat
          -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          -DRT_BUILD_TESTS=ON

      - name: Build (libs + tests)
        run: cmake --build runtime-flat/build --parallel

      - name: Run framework_test
        run: runtime-flat/build/framework_test.exe

      - name: Run runtime_integration_test
        run: runtime-flat/build/runtime_integration_test.exe

      - name: Run unit_test
        run: runtime-flat/build/unit_test.exe

  build-repl:
    name: Build REPL (End-to-End)
    needs: [build-java]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y g++ cmake

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: st2c-jar
          path: java/target/

      - name: Build REPL (full pipeline)
        run: make

      - name: Verify binary
        run: file target/repl/plc_repl && ls -lh target/repl/plc_repl

  package:
    name: Package Release ZIP
    if: github.event_name != 'pull_request'
    needs: [build-java, build-runtime, build-repl]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: st2c-jar
          path: java/target/

      - name: Package into ZIP
        run: |
          New-Item -ItemType Directory -Force -Path st2c-release
          # JAR (only the compiler, no java source)
          Copy-Item java/target/st2c-jar-with-dependencies.jar st2c-release/
          # Runtime source for fat runtime compilation
          Copy-Item -Recurse runtime-flat st2c-release/runtime-flat/
          Remove-Item -Recurse -Force st2c-release/runtime-flat/build -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force st2c-release/runtime-flat/tests -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force st2c-release/runtime-flat/docs -ErrorAction SilentlyContinue
          # Platform target source
          Copy-Item -Recurse target st2c-release/target/
          # Examples
          Copy-Item -Recurse examples st2c-release/examples/
          Copy-Item Makefile st2c-release/
          Copy-Item README.md st2c-release/
          Compress-Archive -Path st2c-release/* -DestinationPath st2c-build.zip

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: st2c-build
          path: st2c-build.zip
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: st2c-build.zip
          generate_release_notes: true
